version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=devopssdm
      - DB_USER=postgres
      - DB_PASSWORD=
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  db:
    image: postgres:17
    environment:
      - POSTGRES_DB=devopssdm
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/fare_schema.sql:/docker-entrypoint-initdb.d/01_fare_schema.sql
      - ./backend/db/payment_schema.sql:/docker-entrypoint-initdb.d/02_payment_schema.sql

volumes:
  pgdata:
